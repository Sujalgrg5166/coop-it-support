<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>COOP Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="login-page">

    <div class="login-box">

        <img src="/static/images/Coop.png" class="login-logo">

        <h2>🔐 COOP IT Support</h2>
        <p class="login-subtitle">Log ind for at få adgang til supportportalen</p>

        <form method="POST">
            <input type="text" name="bruger_id" placeholder="👤 Bruger ID" required>
            <input type="password" name="password" placeholder="🔑 Password" required>

            <button type="submit">Log ind</button>
        </form>

        {% if error %}
        <div class="login-error">
            {{ error }}
        </div>
        {% endif %}

    </div>

</div>

</body>
</html>
